# [colors]

;-------------------------
; Catppuccin Frapp√© Palette
; Maintainer: justTOBBI
;--------------------------

[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
 base = #303446
 mantle = #292c3c
 crust = #232634

 text = #c6d0f5
 subtext0 = #a5adce
 subtext1 = #b5bfe2

 surface0 = #414559
 surface1 = #51576d
 surface2 = #626880
 
 overlay0 = #737994
 overlay1 = #838ba7
 overlay2 = #949cbb
 

 blue = #8caaee
 lavender = #babbf1
 sapphire = #85c1dc
 sky = #99d1db
 teal = #81c8be
 green = #a6d189
 yellow = #e5c890
 peach = #ef9f76
 maroon = #ea999c
 red = #e78284
 mauve = #ca9ee6
 pink = #f4b8e4
 flamingo = #eebebe
 rosewater = #f2d5cf

 transparent = #FF00000

[bar/example]
width = 100%
height = 28pt
radius = 6

; dpi = 96

background = ${colors.base}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.sky}

font-0 = "CaskaydiaCove Nerd Font:size=14;2"

modules-left = xworkspaces xwindow i3
modules-right = pulseaudio filesystem memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces
icon-0 = Music;ÔÄĀ
icon-1 = Game;ůįłĽ
icon-default = ÔĄą
label-active = %icon% %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %icon% %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}ůįčä%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/i3]
type = internal/i3
format = <label-mode>
label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>
label-muted = ůįĖĀ muted
label-muted-foreground = #666
ramp-volume-0 = ÔÄß
ramp-volume-1 = ůįēĺ
ramp-volume-2 = ÔÄ®
click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
# label = %percentage_used:2%%
label = %gb_used%/%gb_total%
format = <bar-used>
bar-used-indicator = 
bar-used-width = 10
bar-used-foreground-0 = #55aa55
bar-used-foreground-1 = #557755
bar-used-foreground-2 = #f5a70a
bar-used-foreground-3 = #ff5555
bar-used-fill = ‚Ėź
bar-used-empty = ‚Ėź
bar-used-empty-foreground = #444444

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "ÓČŹ "
format-prefix-foreground = ${colors.primary}
# label = %percentage:2%%
format = <ramp-coreload>
ramp-coreload-spacing = 1px
ramp-coreload-0 = ‚ĖĀ
ramp-coreload-1 = ‚Ėā
ramp-coreload-2 = ‚ĖÉ
ramp-coreload-3 = ‚ĖĄ
ramp-coreload-4 = ‚ĖÖ
ramp-coreload-5 = ‚ĖÜ
ramp-coreload-6 = ‚Ėá
ramp-coreload-7 = ‚Ėą

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}ůĪöł %essid%%{F-} Ó™†%upspeed% Ó™Ě%downspeed%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
